<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <!-- 玻璃效果 -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:0.7" />
    </linearGradient>
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <!-- 内发光 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- 玻璃高光 -->
  <ellipse cx="80" cy="70" rx="50" ry="40" fill="url(#glassGrad)" opacity="0.3"/>
  
  <!-- 米粒形状 - 组成婴儿轮廓 -->
  <!-- 头部 - 大米粒 -->
  <ellipse cx="100" cy="75" rx="35" ry="30" fill="#fff" opacity="0.95" filter="url(#glow)"/>
  <ellipse cx="100" cy="75" rx="35" ry="30" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- 眼睛 -->
  <circle cx="88" cy="70" r="4" fill="#333"/>
  <circle cx="112" cy="70" r="4" fill="#333"/>
  <circle cx="89" cy="69" r="1.5" fill="#fff"/>
  <circle cx="113" cy="69" r="1.5" fill="#fff"/>
  
  <!-- 微笑 -->
  <path d="M 90 82 Q 100 92 110 82" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 腮红 -->
  <circle cx="80" cy="80" r="6" fill="#ff9999" opacity="0.6"/>
  <circle cx="120" cy="80" r="6" fill="#ff9999" opacity="0.6"/>
  
  <!-- 身体 - 米粒组合 -->
  <ellipse cx="100" cy="120" rx="30" ry="25" fill="#fff" opacity="0.9"/>
  <ellipse cx="100" cy="120" rx="30" ry="25" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- 播放按钮 -->
  <g transform="translate(100, 120)">
    <polygon points="-8,-10 -8,10 10,0" fill="#667eea" opacity="0.8"/>
  </g>
  
  <!-- 米粒装饰 -->
  <ellipse cx="60" cy="55" rx="8" ry="5" fill="#fff" opacity="0.6" transform="rotate(-30 60 55)"/>
  <ellipse cx="140" cy="55" rx="8" ry="5" fill="#fff" opacity="0.6" transform="rotate(30 140 55)"/>
  <ellipse cx="65" cy="140" rx="8" ry="5" fill="#fff" opacity="0.6" transform="rotate(20 65 140)"/>
  <ellipse cx="135" cy="140" rx="8" ry="5" fill="#fff" opacity="0.6" transform="rotate(-20 135 140)"/>
  
  <!-- 光晕效果 -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#bgGrad)" stroke-width="2" opacity="0.5"/>
</svg>
