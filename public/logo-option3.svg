<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 渐变 -->
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00cec9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0984e3;stop-opacity:1" />
    </linearGradient>
    <!-- 玻璃效果 -->
    <linearGradient id="glass2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0.1" />
    </linearGradient>
    <!-- 阴影 -->
    <filter id="shadow3">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="200" height="200" rx="45" fill="#2d3436"/>
  
  <!-- 玻璃卡片 -->
  <rect x="15" y="15" width="170" height="170" rx="35" fill="url(#glass2)" stroke="#fff" stroke-width="0.5" stroke-opacity="0.3"/>
  
  <!-- 米粒婴儿 - 极简风格 -->
  <g transform="translate(100, 90)">
    <!-- 头部 -->
    <ellipse cx="0" cy="0" rx="40" ry="35" fill="url(#grad3)" filter="url(#shadow3)"/>
    
    <!-- 眼睛 -->
    <circle cx="-15" cy="-5" r="6" fill="#fff"/>
    <circle cx="15" cy="-5" r="6" fill="#fff"/>
    <circle cx="-13" cy="-5" r="3" fill="#2d3436"/>
    <circle cx="17" cy="-5" r="3" fill="#2d3436"/>
    
    <!-- 微笑 -->
    <path d="M -12 12 Q 0 22 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- 身体 - 播放按钮 -->
  <g transform="translate(100, 140)">
    <circle cx="0" cy="0" r="25" fill="url(#grad4)" filter="url(#shadow3)"/>
    <polygon points="-8,-12 -8,12 14,0" fill="#fff"/>
  </g>
  
  <!-- 米粒装饰 -->
  <circle cx="30" cy="30" r="4" fill="#ffeaa7" opacity="0.6"/>
  <circle cx="170" cy="30" r="4" fill="#ffeaa7" opacity="0.6"/>
  <circle cx="30" cy="170" r="4" fill="#ffeaa7" opacity="0.6"/>
  <circle cx="170" cy="170" r="4" fill="#ffeaa7" opacity="0.6"/>
  
  <!-- 光点 -->
  <circle cx="50" cy="50" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="150" cy="50" r="2" fill="#fff" opacity="0.8"/>
</svg>
